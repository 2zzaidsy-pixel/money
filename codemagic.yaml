workflows:
  build-debug:
    name: PayWise Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      java: 17
      vars:
        GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true
    scripts:
      - name: Create google-services.json if missing
        script: |
          if [ ! -f "app/google-services.json" ]; then
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0000000000000000","android_client_info":{"package_name":"com.paywise.app"}},"oauth_client":[],"api_key":[{"current_key":"PLACEHOLDER_API_KEY"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]},"ads_service":{"test_banner_ad_unit_id":"PLACEHOLDER"}}}],"configuration_version":"1"}' > app/google-services.json
          fi
      - name: Build debug APK
        script: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
